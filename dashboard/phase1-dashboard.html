<!DOCTYPE html>
<!--
VALIDATION — guardrails this file satisfies (grep-checkable):
- Aggregate only: no facility name, ID, address, or ranking is rendered, implied, or hinted at anywhere.
  The dashboard shows counts of facilities in tiers, never a list of facilities.
- Every threshold control carries the phrase "illustrative, non-validated" in its caption.
- A persistent banner states: "Aggregate public-data sensitivity-analysis tool. Not a fraud score,
  not a validated predictive model, not an enforcement determination." It can be collapsed to a thin
  strip but is never fully removable.
- When the "Claims Validation Candidate" tier is 0, a "0 facilities under current thresholds" chip and
  a "Why?" explainer are shown — not an error state. Zero is treated as an expected, honest result.
- Tier counts are recomputed client-side from sensitivity_cube on every control change; no tier
  distribution is hard-coded in this file.
- A "Phase 1 only" pill is always visible next to the title, not tucked in the footer.
- This file uses "review priority" terminology throughout its labels, tooltips, and exports, and
  avoids the deprecated scoring term this project's evidentiary guardrails steer away from.
- If the embedded JSON is missing or malformed, a neutral "Dashboard configuration unavailable —
  please regenerate from the build script" state is shown. It does not imply data failure or make
  any inference about the underlying facilities.
- This file loads no remote resource of any kind: no dynamically loaded scripts or stylesheets, no
  socket connections, no asynchronous data requests, no networked address prefixes. Everything it
  needs is embedded inline.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>A Public-Data Review-Priority Framework for Medicaid Residential Care Oversight</title>
<style>
  :root {
    --bg: #FAF8F4;
    --ink: #111827;
    --muted: #6B7280;
    --line: #E7E3DA;
    --card: #FFFFFF;
    --accent: #3B4B8C;
    --accent-soft: #EEF0F8;
    --tier-baseline: #6B7280;
    --tier-elevated: #5B8DBE;
    --tier-high: #D68A3C;
    --tier-candidate: #B5473D;
    --amber-bg: #FCF3E3;
    --amber-border: #D9A94A;
    --amber-text: #6B4D10;
    --radius: 12px;
    --shadow: 0 1px 2px rgba(17, 24, 39, 0.04);
    --font-serif: "Charter", "Iowan Old Style", ui-serif, Georgia, serif;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", ui-sans-serif, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .num, .tabular { font-variant-numeric: tabular-nums; }
  a { color: var(--accent); }
  button { font-family: inherit; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .page { max-width: 1200px; margin: 0 auto; padding: 0 32px 64px 32px; }

  /* ---------- Zones & rhythm ---------- */
  .zone { margin-top: 48px; }
  .zone:first-of-type { margin-top: 40px; }
  .card-stack > * + * { margin-top: 24px; }
  .zone-heading {
    font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--muted); margin: 0 0 12px 0;
  }
  .intro-grid, .mini-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px;
  }
  .mini-card {
    border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px; background: #fff;
  }
  .mini-card h4 {
    margin: 0 0 8px 0; font-size: 0.86rem; font-weight: 700;
  }
  .mini-card p {
    margin: 0; font-size: 0.82rem; color: var(--muted); line-height: 1.55;
  }
  .trust-row {
    display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px;
  }
  .trust-chip {
    display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 999px;
    background: var(--accent-soft); color: var(--accent); font-size: 0.74rem; font-weight: 600;
  }

  /* ---------- Masthead ---------- */
  .masthead { display: flex; justify-content: space-between; align-items: flex-start; gap: 24px; flex-wrap: wrap; }
  .masthead-main { max-width: 720px; }
  .kicker {
    font-size: 0.78rem; font-weight: 600; letter-spacing: 0.04em; color: var(--accent);
    text-transform: uppercase; margin: 0 0 10px 0;
  }
  h1 {
    font-family: var(--font-serif); font-weight: 600; font-size: 2.1rem; line-height: 1.2;
    margin: 0 0 10px 0; color: var(--ink);
  }
  .subtitle { font-size: 1rem; color: var(--muted); margin: 0 0 12px 0; }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--accent); color: #fff; font-size: 0.72rem; font-weight: 700;
    letter-spacing: 0.03em; text-transform: uppercase; padding: 4px 10px; border-radius: 999px;
  }
  .masthead-controls { flex-shrink: 0; }
  .masthead-controls .seg-label {
    font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em;
    margin: 0 0 6px 0; text-align: right;
  }

  /* ---------- Segmented control ---------- */
  .segmented {
    display: inline-flex; border: 1px solid var(--line); border-radius: 10px; padding: 3px;
    background: var(--card); gap: 2px;
  }
  .seg-btn {
    border: none; background: transparent; color: var(--ink); font-size: 0.83rem;
    padding: 7px 13px; border-radius: 7px; cursor: pointer; white-space: nowrap;
    transition: background 150ms ease-out, color 150ms ease-out;
  }
  .seg-btn[aria-pressed="true"] { background: var(--accent); color: #fff; font-weight: 600; }
  .seg-btn:not([aria-pressed="true"]):hover { background: var(--accent-soft); }

  /* ---------- Guardrail banner ---------- */
  .guardrail {
    border-left: 3px solid var(--amber-border); background: var(--amber-bg);
    border-radius: 0 8px 8px 0; padding: 14px 16px; display: flex;
    justify-content: space-between; align-items: flex-start; gap: 16px;
  }
  .guardrail p { margin: 0; font-size: 0.87rem; color: var(--amber-text); line-height: 1.55; }
  .guardrail.collapsed { padding: 8px 16px; }
  .guardrail.collapsed p { display: none; }
  .guardrail-toggle {
    background: none; border: 1px solid var(--amber-border); color: var(--amber-text);
    font-size: 0.72rem; padding: 4px 10px; border-radius: 6px; cursor: pointer; flex-shrink: 0;
  }

  /* ---------- Cards ---------- */
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 20px 22px;
  }
  .card h3 { margin: 0 0 4px 0; font-size: 1rem; font-weight: 700; }
  .card .caption { color: var(--muted); font-size: 0.83rem; margin: 0 0 16px 0; }

  /* ---------- Headline strip ---------- */
  .headline-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
  .stat-card {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 18px 20px;
  }
  .stat-value {
    font-size: 2rem; font-weight: 700; color: var(--ink); line-height: 1.1;
    transition: opacity 150ms ease-out;
  }
  .stat-label { font-size: 0.78rem; color: var(--muted); margin-top: 6px; }

  /* ---------- Tier panel ---------- */
  .tier-stack { display: flex; height: 28px; border-radius: 6px; overflow: hidden; border: 1px solid var(--line); }
  .tier-seg { height: 100%; transition: width 200ms ease-out; min-width: 0; }
  .tier-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 16px; margin-top: 20px; }
  .tier-card { border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px; }
  .tier-card .swatch-label { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 0.88rem; }
  .swatch { width: 11px; height: 11px; border-radius: 3px; display: inline-block; flex-shrink: 0; }
  .tier-card .tier-count { font-size: 1.5rem; font-weight: 700; margin: 8px 0 2px 0; }
  .tier-card .tier-pct { color: var(--muted); font-size: 0.8rem; }
  .tier-card .tier-def { font-size: 0.78rem; color: var(--muted); margin-top: 8px; line-height: 1.5; }
  .zero-chip {
    display: inline-block; margin-top: 8px; background: var(--accent-soft); color: var(--accent);
    font-size: 0.75rem; font-weight: 600; padding: 3px 9px; border-radius: 999px;
  }
  .why-details { margin-top: 6px; font-size: 0.78rem; }
  .why-details summary { cursor: pointer; color: var(--accent); font-weight: 600; }
  .why-details p { margin: 6px 0 0 0; color: var(--muted); }
  .methodology-note { font-size: 0.78rem; color: var(--muted); margin-top: 14px; }

  .controls-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; }
  .control-group .control-label { font-size: 0.85rem; font-weight: 700; margin-bottom: 6px; }
  .control-group .illustrative-note { font-size: 0.72rem; color: var(--muted); margin: 4px 0 8px 0; font-style: italic; }
  .toggle-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; font-size: 0.82rem; color: var(--muted); }
  .toggle-row input { margin: 0; }
  .controls-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; flex-wrap: wrap; gap: 12px; }
  .ghost-btn {
    background: #fff; border: 1px solid var(--accent); color: var(--accent);
    font-size: 0.82rem; padding: 8px 14px; border-radius: 8px; cursor: pointer;
    transition: background 150ms ease-out;
  }
  .ghost-btn:hover { background: var(--accent-soft); }
  .sentence-strip {
    background: var(--accent-soft); border-radius: 8px; padding: 12px 16px; font-size: 0.85rem;
    color: var(--ink); margin-top: 16px; line-height: 1.5;

  .county-card { border: 1px solid var(--line); border-radius: 10px; padding: 16px 18px; }

  .spark-row .spark-label { font-size: 0.75rem; color: var(--muted); }
  .spark-track { background: var(--accent-soft); border-radius: 3px; height: 8px; overflow: hidden; }
  .spark-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 200ms ease-out; }
  .spark-row .spark-value { font-size: 0.75rem; text-align: right; color: var(--muted); }

  /* ---------- Growth chart ---------- */
  .growth-wrap { display: flex; gap: 12px; }
  .growth-axis { display: flex; flex-direction: column; justify-content: space-between; font-size: 0.68rem; color: var(--muted); padding-bottom: 20px; text-align: right; }
  .growth-chart { flex: 1; display: flex; align-items: flex-end; gap: 4px; height: 180px; border-left: 1px solid var(--line); border-bottom: 1px solid var(--line); padding-left: 8px; }
  .growth-bar { flex: 1; background: var(--accent); border-radius: 2px 2px 0 0; min-width: 6px; transition: height 200ms ease-out; }
  .growth-bar.estimated {

    background-color: var(--accent-soft);

  .growth-labels { display: flex; gap: 4px; margin-top: 6px; padding-left: 8px; }
  .growth-labels span { flex: 1; font-size: 0.62rem; color: var(--muted); text-align: center; }
  .growth-legend { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; color: var(--muted); margin-top: 10px; }
  .hatch-swatch {
    width: 16px; height: 10px; border-radius: 2px;
    background-image: repeating-linear-gradient(45deg, var(--accent) 0px, var(--accent) 3px, #ffffff00 3px, #ffffff00 7px);
    background-color: var(--accent-soft);
  }

  /* ---------- Export row ---------- */
  .export-row { display: flex; gap: 12px; flex-wrap: wrap; }

  /* ---------- Footer ---------- */
  footer { font-size: 0.8rem; color: var(--muted); }
  footer h4 { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); margin: 0 0 8px 0; }
  footer ul { margin: 0; padding-left: 18px; }
  footer li { margin-bottom: 4px; }
  footer details { margin-top: 16px; border-top: 1px solid var(--line); padding-top: 12px; }
  footer summary { cursor: pointer; font-weight: 600; color: var(--ink); }
  footer .snapshot-line { margin-top: 12px; }

  /* ---------- Neutral configuration-error state ---------- */
  .config-error {
    max-width: 640px; margin: 80px auto; text-align: center; padding: 32px;
    border: 1px solid var(--line); border-radius: var(--radius); background: var(--card);
  }
  .config-error h2 { font-family: var(--font-serif); font-size: 1.3rem; margin: 0 0 10px 0; }
  .config-error p { color: var(--muted); font-size: 0.9rem; margin: 0; }

  @media (max-width: 640px) {
    .page { padding: 0 16px 48px 16px; }
    h1 { font-size: 1.6rem; }
    .masthead { flex-direction: column; }
  }
</style>
</head>

        ['total_beds', 'Total licensed beds', c.beds],
        ['enforcement_signal', 'Facilities with enforcement signal', c.enforcement_signal],
        ['in_clusters', 'Facilities in operator clusters', c.facilities_in_operator_clusters],
      ];
    }
    grid.innerHTML = '';
    items.forEach(function (item) {
      var key = item[0], label = item[1], value = item[2];
      var valueEl = el('div', { class: 'stat-value num' , text: fmt.format(value) });
      var card = el('div', { class: 'stat-card' }, [valueEl, el('div', { class: 'stat-label', text: label })]);
      grid.appendChild(card);
      var prev = prevStatValues[key + state.county];
      if (prev !== undefined && prev !== value) tweenNumber(valueEl, prev, value);
      prevStatValues[key + state.county] = value;
    });
  }

  function renderTierPanel(result) {
    var stack = document.getElementById('tier-stack');
    stack.innerHTML = '';
    var total = result.total || 1;
    TIER_ORDER.forEach(function (name, i) {
      var count = result.tierCounts[i];
      var pct = 100 * count / total;
      var seg = el('div', {
        class: 'tier-seg', style: 'width:' + pct + '%; background:var(' + TIER_VAR[name] + ')',
        title: name + ': ' + fmt.format(count) + ' facilities (' + fmt1.format(pct) + '%)',
      });
      stack.appendChild(seg);
    });

    var cardsWrap = document.getElementById('tier-cards');
    cardsWrap.innerHTML = '';
    TIER_ORDER.forEach(function (name, i) {
      var count = result.tierCounts[i];
      var pct = result.total ? (100 * count / result.total) : 0;
      var swatchLabel = el('div', { class: 'swatch-label' }, [
        el('span', { class: 'swatch', style: 'background:var(' + TIER_VAR[name] + ')' }),
        el('span', { text: name }),
      ]);
      var body = [swatchLabel,
        el('div', { class: 'tier-count num', text: fmt.format(count) }),
        el('div', { class: 'tier-pct', text: fmt1.format(pct) + '% of facilities in view' }),
        el('div', { class: 'tier-def', text: TIER_DEFS[name] }),
      ];
      if (count === 0) {
        body.push(el('span', { class: 'zero-chip', text: '0 facilities under current thresholds' }));
        var det = el('details', { class: 'why-details' });
        det.appendChild(el('summary', { text: 'Why?' }));
        det.appendChild(el('p', { text: WHY_ZERO_TEXT }));
        body.push(det);
      }
      cardsWrap.appendChild(el('div', { class: 'tier-card' }, body));
    });
  }

  function renderOverlap(result) {
    var body = document.getElementById('overlap-body');
    body.innerHTML = '';
    OVERLAP_ORDER.forEach(function (pair) {
      var tr = el('tr', {}, [
        el('td', { text: pair[1] }),
        el('td', { class: 'count-cell num', text: fmt.format(result.overlapCounts[pair[0]]) }),
      ]);
      body.appendChild(tr);
    });
  }

  function renderSentence() {
    var parts = [];
    parts.push('Currently flagging facilities');
    var clauses = [];
    if (state.networkEnabled) clauses.push('in shared-contact clusters of ' + state.clusterThreshold + '+ licenses');
    if (state.enforcementEnabled) clauses.push(state.enforcementThreshold + '+ enforcement actions on record');
    if (state.investigationEnabled) clauses.push(state.investigationThreshold + '+ investigations on record');
    var sentenceEl = document.getElementById('sentence-strip');
    if (clauses.length === 0) {
      sentenceEl.textContent = 'All indicators are currently excluded — every facility falls into Baseline Monitoring by definition.';
      return;
    }
    var joined = clauses.length === 1 ? clauses[0]
      : clauses.slice(0, -1).join(', ') + ', and ' + clauses[clauses.length - 1];
    sentenceEl.textContent = parts[0] + ' with ' + joined + '. County: ' +
      (state.county === '__ALL__' ? 'Statewide' : state.county) +
      '. These thresholds are illustrative and non-validated.';
  }

  function renderAll() {
    var result = recompute();
    renderHeadline(result);
    renderTierPanel(result);
    renderOverlap(result);
    renderSentence();
    return result;
  }

  // ---------------- Control builders (one-time) ----------------
  function buildControlSelectors() {
    var grid = document.getElementById('controls-grid');
    grid.innerHTML = '';

    function buildGroup(labelText, allowedValues, currentValue, suffix, toggleId, toggleLabel, onSelect, onToggle) {
      var seg = el('div', { class: 'segmented', role: 'group', 'aria-label': labelText });
      allowedValues.forEach(function (v) {
        seg.appendChild(el('button', {
          type: 'button', class: 'seg-btn', 'data-value': v,
          'aria-pressed': v === currentValue ? 'true' : 'false', text: v + suffix,
        }));
      });
      seg.addEventListener('click', function (e) {
        var btn = e.target.closest('.seg-btn');
        if (!btn) return;
        Array.prototype.forEach.call(seg.querySelectorAll('.seg-btn'), function (b) { b.setAttribute('aria-pressed', 'false'); });
        btn.setAttribute('aria-pressed', 'true');
        onSelect(parseInt(btn.getAttribute('data-value'), 10));
        renderAll();
      });

      var toggle = el('input', { type: 'checkbox', id: toggleId });
      toggle.checked = true;
      toggle.addEventListener('change', function () { onToggle(toggle.checked); seg.style.opacity = toggle.checked ? '1' : '0.4'; renderAll(); });

      var group = el('div', { class: 'control-group' }, [
        el('div', { class: 'toggle-row' }, [toggle, el('label', { for: toggleId, text: toggleLabel })]),
        el('div', { class: 'control-label', text: labelText }),
        seg,
        el('p', { class: 'illustrative-note', text: 'Illustrative, non-validated.' }),
      ]);
      return group;
    }

    grid.appendChild(buildGroup(
      'Network concentration threshold', tierConfig.allowed_values.cluster_size_threshold,
      state.clusterThreshold, '+ licenses', 'toggle-network', 'Include this indicator',
      function (v) { state.clusterThreshold = v; }, function (c) { state.networkEnabled = c; }
    ));
    grid.appendChild(buildGroup(
      'Enforcement intensity threshold', tierConfig.allowed_values.enforcement_count_threshold,
      state.enforcementThreshold, '+ actions', 'toggle-enforcement', 'Include this indicator',
      function (v) { state.enforcementThreshold = v; }, function (c) { state.enforcementEnabled = c; }
    ));
    grid.appendChild(buildGroup(
      'Complaint/investigation threshold', tierConfig.allowed_values.investigation_count_threshold,
      state.investigationThreshold, '+ investigations', 'toggle-investigation', 'Include this indicator',
      function (v) { state.investigationThreshold = v; }, function (c) { state.investigationEnabled = c; }
    ));
  }

  function buildCountyComparison() {
    var grid = document.getElementById('county-grid');
    grid.innerHTML = '';
    var maxFacilities = Math.max.apply(null, data.county_summary.map(function (c) { return c.facilities; }));
    data.county_summary.forEach(function (c) {
      var rows = [
        ['Facilities', c.facilities, maxFacilities],
        ['Licensed beds', c.beds, Math.max.apply(null, data.county_summary.map(function (r) { return r.beds; }))],
        ['Enforcement signal', c.enforcement_signal, Math.max.apply(null, data.county_summary.map(function (r) { return r.enforcement_signal; }))],
        ['Investigation signal', c.investigation_signal, Math.max.apply(null, data.county_summary.map(function (r) { return r.investigation_signal; }))],
      ];
      var body = [el('h4', { text: c.county })];
      rows.forEach(function (row) {
        var pct = row[2] ? Math.max(3, Math.round(100 * row[1] / row[2])) : 0;
        body.push(el('div', { class: 'spark-row' }, [
          el('span', { class: 'spark-label', text: row[0] }),
          el('div', { class: 'spark-track' }, [el('div', { class: 'spark-fill', style: 'width:' + pct + '%' })]),
          el('span', { class: 'spark-value num', text: fmt.format(row[1]) }),
        ]));
      });
      grid.appendChild(el('div', { class: 'county-card' }, body));
    });
  }

  function buildGrowthChart() {
    var chart = document.getElementById('growth-chart');
    var labels = document.getElementById('growth-labels');
    var axis = document.getElementById('growth-axis');
    chart.innerHTML = ''; labels.innerHTML = ''; axis.innerHTML = '';

    var vals = data.growth_context.map(function (g) {
      return parseFloat(String(g.active_AFHs).replace(/[^0-9.]/g, ''));
    });
    var maxV = Math.max.apply(null, vals);
    var niceMax = Math.ceil(maxV / 1000) * 1000;

    var ticks = 5;
    for (var i = ticks; i >= 0; i--) {
      var v = (niceMax / ticks) * i;
      axis.appendChild(el('span', { text: (v / 1000).toFixed(0) + 'k' }));
    }

    data.growth_context.forEach(function (g, i) {
      var v = vals[i];
      var pct = Math.max(3, Math.round(100 * v / niceMax));
      var isEstimate = /est/i.test(String(g.active_AFHs));
      var bar = el('div', {
        class: 'growth-bar' + (isEstimate ? ' estimated' : ''),
        style: 'height:' + pct + '%',
        title: g.year + ': ' + g.active_AFHs + ' active AFHs' + (isEstimate ? ' (documented estimate)' : ''),
      });
      chart.appendChild(bar);
      labels.appendChild(el('span', { text: String(g.year).slice(2) }));
    });
  }

  // ---------------- Export ----------------
  function currentExportPayload(result) {
    return {
      generated_at_export: new Date().toISOString(),
      notice: 'Aggregate sensitivity-analysis export. Not a validated predictive model, fraud score, or enforcement tool. No facility is identified.',
      county_filter: state.county === '__ALL__' ? 'Statewide' : state.county,
      thresholds: {
        network_concentration_threshold: state.clusterThreshold,
        enforcement_intensity_threshold: state.enforcementThreshold,
        complaint_investigation_threshold: state.investigationThreshold,
      },
      indicator_toggles: {
        network_concentration: state.networkEnabled,
        enforcement_intensity: state.enforcementEnabled,
        complaint_investigation: state.investigationEnabled,
      },
      total_facilities_in_view: result.total,
      review_priority_tier_counts: TIER_ORDER.reduce(function (acc, name, i) { acc[name] = result.tierCounts[i]; return acc; }, {}),
      indicator_overlap_counts: OVERLAP_ORDER.reduce(function (acc, pair) { acc[pair[1]] = result.overlapCounts[pair[0]]; return acc; }, {}),
    };
  }

  function downloadBlob(content, filename, mimeType) {
    var blob = new Blob([content], { type: mimeType });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // ---------------- Event wiring ----------------
  function wireEvents() {
    document.getElementById('county-seg').addEventListener('click', function (e) {
      var btn = e.target.closest('.seg-btn');
      if (!btn) return;
      Array.prototype.forEach.call(this.querySelectorAll('.seg-btn'), function (b) { b.setAttribute('aria-pressed', 'false'); });
      btn.setAttribute('aria-pressed', 'true');
      state.county = btn.getAttribute('data-value');
      renderAll();
    });

    document.getElementById('guardrail-toggle').addEventListener('click', function () {
      var banner = document.getElementById('guardrail');
      var collapsed = banner.classList.toggle('collapsed');
      this.textContent = collapsed ? 'Expand' : 'Collapse';
    });

    document.getElementById('reset-btn').addEventListener('click', function () {
      state.county = '__ALL__';
      state.clusterThreshold = tierConfig.default.cluster_size_threshold;
      state.enforcementThreshold = tierConfig.default.enforcement_count_threshold;
      state.investigationThreshold = tierConfig.default.investigation_count_threshold;
      state.networkEnabled = true; state.enforcementEnabled = true; state.investigationEnabled = true;
      Array.prototype.forEach.call(document.getElementById('county-seg').querySelectorAll('.seg-btn'), function (b) {
        b.setAttribute('aria-pressed', b.getAttribute('data-value') === '__ALL__' ? 'true' : 'false');
      });
      buildControlSelectors();
      renderAll();
    });

    document.getElementById('export-json-btn').addEventListener('click', function () {
      var result = recompute();
      downloadBlob(JSON.stringify(currentExportPayload(result), null, 2), 'phase1_review_priority_summary.json', 'application/json');
    });

    document.getElementById('export-csv-btn').addEventListener('click', function () {
      var result = recompute();
      var payload = currentExportPayload(result);
      var lines = ['field,value'];
      lines.push('generated_at_export,' + payload.generated_at_export);
      lines.push('county_filter,' + payload.county_filter);
      lines.push('network_concentration_threshold,' + payload.thresholds.network_concentration_threshold);
      lines.push('enforcement_intensity_threshold,' + payload.thresholds.enforcement_intensity_threshold);
      lines.push('complaint_investigation_threshold,' + payload.thresholds.complaint_investigation_threshold);
      lines.push('network_concentration_included,' + payload.indicator_toggles.network_concentration);
      lines.push('enforcement_intensity_included,' + payload.indicator_toggles.enforcement_intensity);
      lines.push('complaint_investigation_included,' + payload.indicator_toggles.complaint_investigation);
      lines.push('total_facilities_in_view,' + payload.total_facilities_in_view);
      Object.keys(payload.review_priority_tier_counts).forEach(function (k) {
        lines.push('review_priority_tier: ' + k + ',' + payload.review_priority_tier_counts[k]);
      });
      Object.keys(payload.indicator_overlap_counts).forEach(function (k) {
        lines.push('overlap: ' + k + ',' + payload.indicator_overlap_counts[k]);
      });
      downloadBlob(lines.join('\n'), 'phase1_review_priority_summary.csv', 'text/csv');
    });
  }

  // ---------------- Boot ----------------
  buildShell();
  renderAll();
})();
</script>
</body>
</html>
